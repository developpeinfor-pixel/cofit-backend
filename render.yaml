services:
  - type: web
    name: cofit-backend
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build
    startCommand: NODE_ENV=production npm run migration:run && NODE_ENV=production npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: DB_SSL
        value: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TICKET_QR_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: ADMIN_JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ORIGINS
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_FIRST_NAME
        sync: false
      - key: SUPER_ADMIN_LAST_NAME
        sync: false
      - key: SUPER_ADMIN_PHONE
        sync: false
